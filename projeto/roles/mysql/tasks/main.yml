---
- name: Instalar MySQL e dependências Python
  apt:
    name:
      - mysql-server
      - python3-mysqldb
    state: present

- name: Garantir MySQL rodando
  service:
    name: mysql
    state: started
    enabled: yes

- name: Criar banco de dados da aplicação
  mysql_db:
    name: "{{ db_name }}"
    state: present

- name: Criar usuário da aplicação com acesso restrito por IP
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: "192.168.56.%"
    state: present

- name: Restringir bind-address ao IP interno
  lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: "^bind-address"
    line: "bind-address = 192.168.56.13"
  notify: Reiniciar MySQL

- name: Permitir MySQL apenas da rede interna
  ufw:
    rule: allow
    src: "192.168.56.0/24"
    port: "3306"
    proto: tcp
