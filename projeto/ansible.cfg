[defaults]
inventory         = inventory/hosts.ini
remote_user       = vagrant
private_key_file  = ~/.vagrant.d/insecure_private_key
host_key_checking = False
forks             = 5
log_path          = ansible.log
interpreter_python = auto_silent

[privilege_escalation]
become            = True
become_method     = sudo
become_user       = root
become_ask_pass   = False
