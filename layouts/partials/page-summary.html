<article itemscope itemtype="http://schema.org/CreativeWork">
  <header>
    <h2 itemprop="name">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
    {{ end }}
  </header>
  <meta itemprop="inLanguage" content="{{ .Site.LanguageCode }}">
  {{ with .Params.images }}
    <meta itemprop="image" content="{{ index . 0 }}">
  {{ end }}
</article>
