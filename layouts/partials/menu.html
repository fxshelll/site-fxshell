{{ if ne .Site.Params.show_menu false }}
  <nav itemscope itemtype="http://schema.org/SiteNavigationElement">
    {{ $currentNode := . }}
    {{ range .Site.Menus.main }}
      {{ if eq .Identifier "busca" }}
        <a itemprop="url" class="{{if or ($currentNode.IsMenuCurrent "main" .) ($currentNode.HasMenuCurrent "main" .) }}active{{end}}" href="{{ .URL }}" title="Buscar" style="vertical-align:middle;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-bottom:2px;"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </a>
      {{ else }}
        <a itemprop="url" class="{{if or ($currentNode.IsMenuCurrent "main" .) ($currentNode.HasMenuCurrent "main" .) }}active{{end}}" href="{{ .URL }}"><span itemprop="name">{{ .Name }}</span></a>
      {{ end }}
    {{ end }}
  </nav>
{{ end }}
